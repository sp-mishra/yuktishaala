site_name: Grokking Labs
site_description: Deep dives into Distributed Systems, Machine Learning, Operations Research, Interactive Applications, and Management
site_author: sp-mishra
#site_url: https://grokkinglabs.com

theme:
  name: material
  features:
    - navigation.instant          # Instant page loading
    - navigation.tabs             # Horizontal tabs for main sections
    - navigation.sections         # Expandable sections in sidebar
    - navigation.expand           # Expand all sections by default
    - toc.integrate               # Table of contents integrated in sidebar
    - content.code.copy           # Copy button on code blocks
    - search.suggest              # Search suggestions
    - search.highlight            # Highlight search results
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex
  - pymdownx.tabbed
  - pymdownx.tasklist
  - tables
  - admonition

nav:
  - Home: index.md

  - About: about.md

  - Distributed Systems:
    - Overview: distributed-systems/index.md
    - Fundamentals:
      - Introduction to Distributed Systems: distributed-systems/01-introduction.md
      - Challenges & Concepts: distributed-systems/02-challenges.md
    - Consistency & Data:
      - Consistency Models: distributed-systems/03-consistency-models.md
      - CAP Theorem: distributed-systems/04-cap-theorem.md
    - Algorithms:
      - Consensus Algorithms: distributed-systems/05-consensus.md
      - Replication: distributed-systems/06-replication.md
      - Leader Election: distributed-systems/07-leader-election.md
    - Practice:
      - Building a Distributed System: distributed-systems/08-practice.md
      - Common Pitfalls: distributed-systems/09-pitfalls.md

  - Machine Learning:
